services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_sales_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ai_sales_assistant']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: dependencies
    command: >
      sh -c "npm run db:migrate &&
      npm run db:seed:demo &&
      npm run start:dev"
    environment:
      NODE_ENV: development
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      RATE_LIMIT_LIMIT: 100
      RATE_LIMIT_TTL_MS: 60000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_sales_assistant
      DATABASE_POOL_MAX: 10
      DATABASE_CONNECTION_TIMEOUT_MS: 5000
      DATABASE_IDLE_TIMEOUT_MS: 30000
      JWT_SECRET: local-dev-jwt-secret-with-at-least-32-characters
      JWT_EXPIRES_IN: 3600
      AI_PROVIDER: fake
      OPENAI_API_KEY: ''
      OPENAI_MODEL: gpt-4o-mini
      AI_TIMEOUT_MS: 8000
      CHAT_SESSION_TTL: 86400
      CHAT_STALE_CLAIM_MS: 30000
      CHAT_SESSION_CREATE_LIMIT: 10
      CHAT_MESSAGE_LIMIT: 20
      DEMO_USER_PASSWORD: DemoKopiSenja2026!
      DEMO_DATA_RESET_ON_DEPLOY: 'false'
    ports:
      - '3001:3001'
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dependencies
    command: npm run dev -- --hostname 0.0.0.0
    environment:
      NODE_ENV: development
      API_BASE_URL: http://backend:3001
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
      NEXT_PUBLIC_DEMO_BUSINESS_SLUG: kopi-senja-umkm
      NEXT_PUBLIC_API_MOCKING: disabled
      NEXT_PUBLIC_REPOSITORY_URL: https://github.com/S1lvesterTake/ai-sales-assistant
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
